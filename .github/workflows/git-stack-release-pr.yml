name: Git-stack Release PR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Published git-stack tag"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  open-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare formula update from upstream release
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/prepare-git-stack-release-pr.sh "${{ inputs.tag }}"

      - name: Stop when formula is already current
        if: steps.prepare.outputs.changed != 'true'
        run: exit 0

      - name: Configure git author
        if: steps.prepare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit formula update on release branch
        if: steps.prepare.outputs.changed == 'true'
        run: |
          git switch -C "${{ steps.prepare.outputs.branch_name }}"
          git add Formula/git-stack.rb
          git commit -m "Update git-stack to ${{ steps.prepare.outputs.tag }}"

      - name: Push release branch
        if: steps.prepare.outputs.changed == 'true'
        run: git push --force-with-lease origin "${{ steps.prepare.outputs.branch_name }}"

      - name: Create or reuse pull request
        if: steps.prepare.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr="$(gh pr list --head "${{ steps.prepare.outputs.branch_name }}" --state all --json url --jq '.[0].url // ""')"

          if [ -n "$existing_pr" ]; then
            printf 'pr_url=%s\n' "$existing_pr" >> "$GITHUB_OUTPUT"
            printf 'new_pr=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > pr-body.md <<'EOF'
          ## Summary
          - update `Formula/git-stack.rb` to `${{ steps.prepare.outputs.tag }}` from the immutable tagged source archive
          - embed the release tag commit and tag date in the built binary version output
          - generated from upstream release `${{ steps.prepare.outputs.release_url }}`

          ## Release Metadata
          - Release: ${{ steps.prepare.outputs.release_url }}
          - Source URL: `${{ steps.prepare.outputs.source_url }}`
          - SHA256: `${{ steps.prepare.outputs.sha256 }}`
          - Build commit: `${{ steps.prepare.outputs.build_commit }}`
          - Build date: `${{ steps.prepare.outputs.build_date }}`
          EOF

          pr_url="$(gh pr create \
            --base main \
            --head "${{ steps.prepare.outputs.branch_name }}" \
            --title "${{ steps.prepare.outputs.pr_title }}" \
            --body-file pr-body.md)"

          printf 'pr_url=%s\n' "$pr_url" >> "$GITHUB_OUTPUT"
          printf 'new_pr=true\n' >> "$GITHUB_OUTPUT"
